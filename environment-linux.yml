name: edge
# Linux x86_64 + NVIDIA GPU (CUDA 11.8), Slurm HPC environment
#
# Create:  conda env create -f environment-linux.yml
# Activate: conda activate edge
#
# After activation, install pytorch3d manually:
#   pip install pytorch3d \
#     --extra-index-url https://dl.fbaipublicfiles.com/pytorch3d/packaging/wheels/py310_cu118_pyt210/download.html
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch=2.1.2
  - pytorch::torchvision=0.16.2
  - pytorch::torchaudio=2.1.2
  - pytorch::pytorch-cuda=11.8
  - numpy<2.0
  - scipy
  - matplotlib
  - tqdm
  - conda-forge::fvcore
  - conda-forge::iopath
  - pip:
      - einops
      - librosa
      - soundfile
      - p_tqdm
      - wandb
      - "accelerate>=0.24,<1.0"
      - jukemirlib
      # pytorch3d: install manually after env creation (see header above)
